<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global AI SEO Forge · Premium Enterprise Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --primary: #6366f1;
            --accent: #a855f7;
            --bg-dark: #020617;
            --glass-bg: rgba(15, 23, 42, 0.7);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b 0%, #020617 40%, #020617 100%);
            min-height: 100vh;
            color: #f8fafc;
        }

        /* 高级玻璃态效果 */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.1);
        }

        /* 渐变文字 */
        .gradient-text {
            background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 按钮动画 */
        .btn-premium {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn-premium::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 60%);
            transform: scale(0);
            transition: transform 0.6s ease-out;
        }

        .btn-premium:hover::after {
            transform: scale(1);
        }

        /* 输入框样式 */
        .input-glow {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }

        .input-glow:focus {
            background: rgba(255, 255, 255, 0.05);
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
            outline: none;
        }

        /* 预览区域样式 */
        .preview-content {
            background: #ffffff;
            color: #0f172a;
            border-radius: 1rem;
            line-height: 1.7;
        }

        .preview-content h1 { font-size: 1.75rem; font-weight: 800; color: #1e293b; margin-bottom: 1.5rem; border-bottom: 2px solid #f1f5f9; padding-bottom: 0.5rem; }
        .preview-content h2 { font-size: 1.5rem; font-weight: 700; color: #334155; margin-top: 2rem; margin-bottom: 1rem; }
        .preview-content ul { list-style: disc; padding-left: 1.5rem; margin-bottom: 1rem; }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <nav class="sticky top-0 z-50 glass-card border-b border-white/5 px-6 py-4 mb-8">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <span class="text-xl font-extrabold tracking-tight">Damo <span class="gradient-text">Forge</span></span>
            </div>
            <div class="flex items-center space-x-6">
                <div id="creditBadge" class="hidden sm:flex items-center space-x-2 bg-white/5 border border-white/10 px-4 py-1.5 rounded-full">
                    <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                    <span class="text-xs font-semibold text-slate-300 uppercase tracking-widest">Credits: <span id="userCredits">5</span></span>
                </div>
                <button id="loginBtn" class="text-sm font-bold bg-white text-slate-950 px-5 py-2 rounded-full hover:bg-slate-200 transition-all shadow-lg">
                    Login with Google
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pb-20">
        <div class="glass-card rounded-3xl p-8 mb-10">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-3 uppercase tracking-widest">Platform Strategy</label>
                        <select id="platformSelect" class="input-glow w-full px-5 py-4 rounded-2xl text-base appearance-none">
                            <option value="amazon">Amazon Listing (A10 Algorithm)</option>
                            <option value="shopify">Shopify Blog (SEO Focus)</option>
                            <option value="etsy">Etsy Listing (Creative)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-3 uppercase tracking-widest">Core Keyword</label>
                        <input type="text" id="keywordInput" placeholder="Enter primary keyword..." class="input-glow w-full px-5 py-4 rounded-2xl text-base">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-400 mb-3 uppercase tracking-widest">Category</label>
                            <select id="categorySelect" class="input-glow w-full px-5 py-4 rounded-2xl text-base appearance-none">
                                <option value="eco-tech">Eco-Friendly Tech</option>
                                <option value="home">Home & Living</option>
                                <option value="outdoor">Outdoor Gear</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 mb-3 uppercase tracking-widest">Audience</label>
                            <input type="text" id="audienceInput" placeholder="Eco-workers" class="input-glow w-full px-5 py-4 rounded-2xl text-base">
                        </div>
                    </div>
                </div>

                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-3 uppercase tracking-widest">Selling Points (One per line)</label>
                        <textarea id="sellingPointsInput" placeholder="Unique benefit 1&#10;Unique benefit 2" class="input-glow w-full px-5 py-4 rounded-2xl text-base h-[184px] resize-none"></textarea>
                    </div>
                </div>
            </div>

            <button id="generateBtn" class="btn-premium w-full mt-10 text-white font-extrabold py-5 rounded-2xl flex items-center justify-center space-x-3 text-lg shadow-2xl">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                <span>GENERATE PREMIUM CONTENT</span>
            </button>
        </div>

        <div id="outputSection" class="hidden fade-in space-y-8">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="glass-card rounded-3xl overflow-hidden flex flex-col">
                    <div class="px-6 py-4 bg-white/5 border-b border-white/5 flex items-center justify-between">
                        <span class="text-xs font-black uppercase tracking-widest text-indigo-400">Markdown Source</span>
                        <div class="flex space-x-1"><div class="w-2 h-2 rounded-full bg-red-500"></div><div class="w-2 h-2 rounded-full bg-yellow-500"></div><div class="w-2 h-2 rounded-full bg-green-500"></div></div>
                    </div>
                    <textarea id="sourceEditor" class="w-full h-[600px] bg-transparent p-8 text-sm font-mono text-slate-300 border-none focus:ring-0 resize-none" spellcheck="false"></textarea>
                </div>

                <div class="glass-card rounded-3xl overflow-hidden flex flex-col">
                    <div class="px-6 py-4 bg-white/5 border-b border-white/5 flex items-center justify-between">
                        <span class="text-xs font-black uppercase tracking-widest text-purple-400">Live Preview (Rendered)</span>
                        <span class="text-[10px] bg-slate-800 px-2 py-0.5 rounded-md text-slate-400">READ-ONLY</span>
                    </div>
                    <div id="previewPanel" class="preview-content h-[600px] p-10 overflow-y-auto m-2"></div>
                </div>
            </div>

            <div class="flex flex-col sm:flex-row gap-4">
                <button id="copyBtn" class="flex-1 glass-card hover:bg-white/10 text-white font-bold py-5 rounded-2xl flex items-center justify-center space-x-3">
                    <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    <span>Copy Markdown</span>
                </button>
                <button id="copyHtmlBtn" class="flex-1 glass-card hover:bg-white/10 text-white font-bold py-5 rounded-2xl flex items-center justify-center space-x-3">
                    <svg class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    <span>Copy for Shopify/Amazon</span>
                </button>
            </div>
        </div>
    </main>

    <div id="pricingModal" class="fixed inset-0 z-[100] hidden items-center justify-center p-6 bg-slate-950/80 backdrop-blur-xl">
        <div class="glass-card max-w-lg w-full rounded-3xl p-10 relative">
            <button id="closePricing" class="absolute top-6 right-6 text-slate-500 hover:text-white">✕</button>
            <div class="text-center mb-10">
                <h2 class="text-3xl font-black mb-3">Upgrade to <span class="gradient-text">Pro Plan</span></h2>
                <p class="text-slate-400">Unlock Enterprise AI Models & Image Generation</p>
            </div>
            <div class="bg-indigo-500/10 border border-indigo-500/20 rounded-2xl p-6 mb-8">
                <div class="flex justify-between items-center mb-4">
                    <span class="font-bold">100 AI Credits</span>
                    <span class="text-2xl font-black">$9.90</span>
                </div>
                <ul class="text-sm text-slate-400 space-y-2">
                    <li>✓ High-Quality Llama 3.3 Access</li>
                    <li>✓ SEO Topic Clustering</li>
                    <li>✓ Priority Generation Speed</li>
                </ul>
            </div>
            <button id="buyBtn" class="btn-premium w-full py-5 rounded-2xl font-black tracking-widest uppercase">Purchase with PayPal</button>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 right-10 transform translate-y-20 opacity-0 transition-all duration-300 z-[200]">
        <div class="glass-card border-indigo-500/30 px-8 py-4 rounded-2xl text-sm font-bold shadow-2xl flex items-center space-x-3">
            <span class="w-2 h-2 bg-indigo-500 rounded-full animate-ping"></span>
            <span id="toastMsg">Action Successful</span>
        </div>
    </div>

    <script>
        // 配置保持不变
        const PROVIDER_CONFIG = {
            groq: { models: [{ value: 'llama-3.3-70b-versatile', label: 'Llama 3.3 70B' }] }
        };

        let config = {
            provider: 'groq',
            model: 'llama-3.3-70b-versatile',
            apiKey: '', // 建议在这里填入您的 API Key 或通过后台设置
            credits: 5
        };

        // DOM 获取
        const elements = ['keywordInput', 'sellingPointsInput', 'audienceInput', 'platformSelect', 'generateBtn', 'outputSection', 'sourceEditor', 'previewPanel', 'copyBtn', 'copyHtmlBtn', 'loginBtn', 'creditBadge', 'userCredits', 'pricingModal', 'closePricing', 'buyBtn', 'toast', 'toastMsg'].reduce((acc, id) => {
            acc[id] = document.getElementById(id);
            return acc;
        }, {});

        // 模拟登录逻辑 (Case 1 提醒：实际应用中，用户可以通过设置页控制个人信息)
        elements.loginBtn.addEventListener('click', () => {
            elements.loginBtn.innerHTML = 'damo_ceo@gmail.com';
            elements.creditBadge.classList.remove('hidden');
            elements.loginBtn.classList.replace('bg-white', 'bg-white/10');
            elements.loginBtn.classList.replace('text-slate-950', 'text-white');
            showToast('Welcome Back, General Manager!');
        });

        // 模拟购买逻辑
        elements.buyBtn.addEventListener('click', () => {
            config.credits += 100;
            elements.userCredits.innerText = config.credits;
            elements.pricingModal.classList.add('hidden');
            showToast('Payment Successful! +100 Credits');
        });

        elements.closePricing.addEventListener('click', () => elements.pricingModal.classList.add('hidden'));

        function showToast(msg) {
            elements.toastMsg.innerText = msg;
            elements.toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => elements.toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        // 核心生成逻辑 (昨晚修复的 Llama 3.3 版本)
        elements.generateBtn.addEventListener('click', async () => {
            const keyword = elements.keywordInput.value.trim();
            if (!keyword) return showToast('Please enter a keyword!');
            
            // 积分校验逻辑 (商业版核心)
            if (config.credits <= 0) {
                elements.pricingModal.classList.remove('hidden');
                elements.pricingModal.classList.add('flex');
                return;
            }

            elements.generateBtn.disabled = true;
            elements.generateBtn.innerText = 'FORGING CONTENT...';
            elements.outputSection.classList.remove('hidden');
            elements.sourceEditor.value = '';
            elements.previewPanel.innerHTML = '<div class="text-center py-20 animate-pulse text-slate-500">Mastering SEO algorithms...</div>';

            try {
                // ... 这里的请求逻辑与昨晚一致，保持不变 ...
                const systemPrompt = `You are a world-class SEO writer.`;
                const userPrompt = `Write an optimized listing for: ${keyword}`;

                const response = await fetch('https://damp-breeze-e25elikecamping-api-proxy.kabin7691.workers.dev', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: config.model,
                        messages: [{ role: "system", content: systemPrompt }, { role: "user", content: userPrompt }],
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                const content = data.choices[0].message.content;

                // 成功后扣除积分
                config.credits -= 1;
                elements.userCredits.innerText = config.credits;

                elements.sourceEditor.value = content;
                elements.previewPanel.innerHTML = marked.parse(content);
                showToast('Content Forged Successfully!');
            } catch (err) {
                showToast('API Error. Check console.');
            } finally {
                elements.generateBtn.disabled = false;
                elements.generateBtn.innerText = 'GENERATE PREMIUM CONTENT';
            }
        });

        // 复制逻辑
        elements.copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(elements.sourceEditor.value);
            showToast('Markdown Copied!');
        });

        elements.copyHtmlBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(marked.parse(elements.sourceEditor.value));
            showToast('HTML Ready for Upload!');
        });
    </script>
</body>
</html>
