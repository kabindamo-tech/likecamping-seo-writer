<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global AI SEO Forge · Enterprise Content Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        :root { --primary: #6366f1; --card-bg: rgba(20, 20, 30, 0.8); }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%); min-height: 100vh; color: #e2e8f0; }
        .glass-panel { background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .gradient-text { background: linear-gradient(135deg, #818cf8 0%, #c084fc 50%, #f472b6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .input-field, .platform-select { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: #e2e8f0; transition: all 0.3s ease; }
        .input-field:focus, .platform-select:focus { border-color: #818cf8; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); outline: none; }
        .platform-select option { background: #1a1a2e; }
        .generate-btn { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); transition: all 0.3s; position: relative; overflow: hidden; }
        .generate-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 20px 40px -10px rgba(99, 102, 241, 0.4); }
        .generate-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .unlock-btn { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); transition: all 0.3s; }
        .editor-area { font-family: monospace; font-size: 13px; background: rgba(10, 10, 15, 0.8); color: #e2e8f0; }
        .preview-area { background: #ffffff; color: #1e293b; }
        .preview-area h1 { font-size: 1.875rem; font-weight: 800; border-bottom: 3px solid #e2e8f0; padding-bottom: 0.75rem; margin-bottom: 1.25rem; }
        .preview-area h2 { font-size: 1.5rem; font-weight: 700; margin: 2rem 0 1rem; }
        .preview-area p { margin-bottom: 1.25rem; line-height: 1.8; }
        .preview-area ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1.25rem; }
        .preview-area strong { font-weight: 700; color: #0f172a; }
        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
        .modal { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); }
        .modal-content { background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.1); }
        .fade-in { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="flex items-center justify-between mb-10">
            <div class="flex items-center space-x-4">
                <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg">
                    <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-white tracking-tight">Global AI SEO Forge</h1>
                    <p class="text-sm text-slate-400">Enterprise Content Generation Engine</p>
                </div>
            </div>
            
            <div class="flex items-center space-x-4">
                <div id="creditBadge" class="hidden items-center space-x-2 bg-slate-800/80 border border-slate-700 px-4 py-2 rounded-xl">
                    <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                    <span class="text-sm font-bold text-slate-300">Credits: <span id="userCredits">5</span></span>
                </div>
                <button id="loginBtn" class="text-sm font-bold bg-white text-slate-900 px-6 py-2.5 rounded-xl hover:bg-slate-200 transition-all shadow-lg flex items-center space-x-2">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    <span>Login with Google</span>
                </button>
            </div>
        </header>

        <div class="glass-panel rounded-2xl p-8 mb-8">
            <div class="mb-6">
                <label class="block text-sm font-bold text-slate-300 mb-3 uppercase tracking-wider">Platform Target</label>
                <select id="platformSelect" class="platform-select w-full px-5 py-4 rounded-xl text-base">
                    <option value="shopify">Shopify Blog (AIO Focused)</option>
                    <option value="amazon" selected>Amazon Listing (A10 Algorithm)</option>
                    <option value="etsy">Etsy Product Story (Emotional Branding)</option>
                </select>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-bold text-slate-300 mb-3 uppercase tracking-wider">Primary Keyword</label>
                <input type="text" id="keywordInput" placeholder="e.g., waterproof camping tent" class="input-field w-full px-5 py-4 rounded-xl text-base">
            </div>

            <div class="mb-6">
                <label class="block text-sm font-bold text-slate-300 mb-3 uppercase tracking-wider">KE Long-tail Keywords (Optional)</label>
                <textarea id="keKeywordsInput" placeholder="Paste your Keywords Everywhere long-tail keywords here..." class="input-field w-full px-5 py-4 rounded-xl text-base h-24 resize-none"></textarea>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-bold text-slate-300 mb-3 uppercase tracking-wider">Product Category</label>
                    <select id="categorySelect" class="platform-select w-full px-5 py-4 rounded-xl text-base">
                        <option value="">Select Category...</option>
                        <option value="eco-home">Eco-Friendly Home Tech</option>
                        <option value="sustainable">Sustainable Lifestyle</option>
                        <option value="camping-outdoor">Camping & Outdoor Gear</option>
                        <option value="solar-power">Solar Power System</option>
                        <option value="automotive">Automotive & Off-Road</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-300 mb-3 uppercase tracking-wider">Target Audience</label>
                    <input type="text" id="audienceInput" placeholder="e.g., outdoor enthusiasts" class="input-field w-full px-5 py-4 rounded-xl text-base">
                </div>
            </div>

            <div class="mb-8">
                <label class="block text-sm font-bold text-slate-300 mb-3 uppercase tracking-wider">Key Selling Points (One per line)</label>
                <textarea id="sellingPointsInput" placeholder="Feature 1&#10;Feature 2" class="input-field w-full px-5 py-4 rounded-xl text-base h-28 resize-none"></textarea>
            </div>

            <div class="mb-8">
                <label class="block text-sm font-bold text-slate-300 mb-3 uppercase tracking-wider">Content Length</label>
                <select id="lengthSelect" class="platform-select w-full px-5 py-4 rounded-xl text-base">
                    <option value="short">Short & Punchy (300-500 words)</option>
                    <option value="standard" selected>Standard Optimized (800-1200 words)</option>
                    <option value="long">Long-form Authority (1500-2000+ words)</option>
                </select>
            </div>

            <button id="generateBtn" class="generate-btn w-full text-white font-bold py-5 rounded-xl shadow-xl flex items-center justify-center space-x-3 text-lg">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                <span>Generate Optimized Content</span>
            </button>
        </div>

        <div id="outputSection" class="hidden">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="glass-panel rounded-2xl overflow-hidden">
                    <div class="bg-slate-800/50 px-5 py-4 border-b border-slate-700 flex items-center justify-between">
                        <span class="font-bold text-slate-200">Markdown Source</span>
                    </div>
                    <textarea id="sourceEditor" class="editor-area w-full h-[500px] p-5 border-0 resize-none focus:ring-0 custom-scroll" placeholder="Your content will appear here..."></textarea>
                </div>

                <div class="glass-panel rounded-2xl overflow-hidden">
                    <div class="bg-slate-800/50 px-5 py-4 border-b border-slate-700 flex items-center justify-between">
                        <span class="font-bold text-slate-200">Live Preview</span>
                    </div>
                    <div id="previewPanel" class="preview-area h-[500px] p-6 overflow-y-auto custom-scroll"></div>
                </div>
            </div>

            <div class="flex flex-col sm:flex-row gap-4 mt-6">
                <button id="copyBtn" class="flex-1 bg-slate-800 hover:bg-slate-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all flex items-center justify-center space-x-2 border border-slate-700">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    <span>Copy Markdown</span>
                </button>
                <button id="copyHtmlBtn" class="flex-1 bg-slate-800 hover:bg-slate-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all flex items-center justify-center space-x-2 border border-slate-700">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    <span>Copy as HTML</span>
                </button>
                <button id="regenerateBtn" class="flex-1 generate-btn text-white font-bold py-4 rounded-xl shadow-lg transition-all flex items-center justify-center space-x-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    <span>Regenerate</span>
                </button>
            </div>
        </div>
    </div>

    <div id="pricingModal" class="modal fixed inset-0 z-[100] hidden items-center justify-center p-4">
        <div class="modal-content rounded-2xl p-8 max-md w-full shadow-2xl relative">
            <button id="closePricing" class="absolute top-4 right-4 text-slate-400 hover:text-white">✕</button>
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold text-white mb-2">Out of Credits</h2>
                <p class="text-slate-400 text-sm">Upgrade to Pro to continue generating.</p>
            </div>
            <div class="bg-indigo-500/10 border border-indigo-500/30 rounded-xl p-6 mb-6">
                <div class="flex justify-between items-center mb-2">
                    <span class="font-bold text-white">100 AI Credits</span>
                    <span class="text-xl font-bold text-white">$9.90</span>
                </div>
                <ul class="text-sm text-slate-400 space-y-1">
                    <li>✓ Premium Llama 3.3 Access</li>
                    <li>✓ Unlimited Copywriting</li>
                </ul>
            </div>
            <button id="buyBtn" class="generate-btn w-full py-3 rounded-xl text-white font-bold">Purchase with PayPal</button>
        </div>
    </div>

    <div id="settingsModal" class="modal fixed inset-0 z-50 hidden items-center justify-center p-4">
        <div class="modal-content rounded-2xl p-8 max-w-2xl w-full shadow-2xl">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-bold text-white">System Configuration</h3>
                <button id="closeModal" class="text-slate-400 hover:text-white">✕</button>
            </div>
            <div id="passwordSection" class="mb-6">
                <label class="block text-sm font-medium text-slate-300 mb-2">Master Password</label>
                <div class="flex space-x-3">
                    <input type="password" id="masterPasswordInput" class="input-field flex-1 px-4 py-3 rounded-lg text-sm">
                    <button id="unlockBtn" class="unlock-btn px-6 py-3 rounded-lg text-white font-semibold">Unlock</button>
                </div>
            </div>
            <div id="settingsContainer" class="settings-section locked">
                <div class="locked-overlay"><p class="text-slate-400">Locked</p></div>
                <div id="apiTab" class="tab-content active space-y-4">
                    <div>
                        <label class="block text-sm text-slate-300 mb-2">API Provider</label>
                        <select id="providerSelect" class="platform-select w-full px-4 py-3 rounded-lg"><option value="groq">Groq</option></select>
                    </div>
                    <div>
                        <label class="block text-sm text-slate-300 mb-2">Model</label>
                        <select id="modelSelect" class="platform-select w-full px-4 py-3 rounded-lg"></select>
                    </div>
                    <div>
                        <label class="block text-sm text-slate-300 mb-2">API Key</label>
                        <input type="password" id="apiKeyInput" class="input-field w-full px-4 py-3 rounded-lg">
                    </div>
                </div>
                <button id="saveSettings" class="w-full generate-btn text-white font-bold py-3 rounded-lg mt-6">Save Configuration</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed top-6 right-6 transform translate-x-full transition-transform z-50">
        <div class="bg-slate-900 border border-slate-700 text-white px-6 py-4 rounded-xl flex items-center space-x-3">
            <span id="toastMessage">Success</span>
        </div>
    </div>

    <script>
        const PROVIDER_CONFIG = {
            groq: {
                models: [
                    { value: 'llama-3.3-70b-versatile', label: 'Llama 3.3 70B (Latest)' },
                    { value: 'mixtral-8x7b-32768', label: 'Mixtral 8x7B' },
                    { value: 'gemma2-9b-it', label: 'Gemma 2 9B' }
                ]
            }
        };

        const MASTER_PASSWORD = 'damo2026';

        const DEFAULT_PROMPTS = {
            base: `You are an elite AI SEO copywriter. Create content that ranks and converts. Use proper Markdown styling.`,
            amazon: `AMAZON A10 OPTIMIZATION:\nFocus on benefits, bullet points, and A+ content structure.`,
            shopify: `SHOPIFY AIO OPTIMIZATION:\nFocus on informational intent, FAQ, and topical authority.`,
            etsy: `ETSY OPTIMIZATION:\nFocus on emotional storytelling and handmade aspects.`
        };

        let config = {
            provider: 'groq',
            model: 'llama-3.3-70b-versatile',
            apiKey: localStorage.getItem('ai_api_key') || '',
            credits: 5,
            prompts: {
                base: localStorage.getItem('prompt_base') || DEFAULT_PROMPTS.base,
                amazon: localStorage.getItem('prompt_amazon') || DEFAULT_PROMPTS.amazon,
                shopify: localStorage.getItem('prompt_shopify') || DEFAULT_PROMPTS.shopify,
                etsy: localStorage.getItem('prompt_etsy') || DEFAULT_PROMPTS.etsy
            }
        };

        const [keywordInput, keKeywordsInput, sellingPointsInput, audienceInput, platformSelect, categorySelect, lengthSelect, generateBtn, outputSection, sourceEditor, previewPanel, settingsModal, closeModal, providerSelect, modelSelect, apiKeyInput, saveSettings, masterPasswordInput, unlockBtn, passwordSection, settingsContainer, toast, toastMessage, copyBtn, copyHtmlBtn, regenerateBtn, loginBtn, creditBadge, userCredits, pricingModal, closePricing, buyBtn] = ['keywordInput', 'keKeywordsInput', 'sellingPointsInput', 'audienceInput', 'platformSelect', 'categorySelect', 'lengthSelect', 'generateBtn', 'outputSection', 'sourceEditor', 'previewPanel', 'settingsModal', 'closeModal', 'providerSelect', 'modelSelect', 'apiKeyInput', 'saveSettings', 'masterPasswordInput', 'unlockBtn', 'passwordSection', 'settingsContainer', 'toast', 'toastMessage', 'copyBtn', 'copyHtmlBtn', 'regenerateBtn', 'loginBtn', 'creditBadge', 'userCredits', 'pricingModal', 'closePricing', 'buyBtn'].map(id => document.getElementById(id));

        function updateModelOptions() {
            modelSelect.innerHTML = PROVIDER_CONFIG.groq.models.map(m => 
                `<option value="${m.value}" ${m.value === config.model ? 'selected' : ''}>${m.label}</option>`
            ).join('');
        }
        updateModelOptions();
        apiKeyInput.value = config.apiKey;

        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.shiftKey && e.key === 'A') { e.preventDefault(); settingsModal.classList.remove('hidden'); settingsModal.classList.add('flex'); }
        });

        unlockBtn.addEventListener('click', () => {
            if (masterPasswordInput.value === MASTER_PASSWORD) {
                settingsContainer.classList.remove('locked'); settingsContainer.classList.add('unlocked');
                passwordSection.classList.add('hidden'); showToast('Access granted');
            }
        });

        closeModal.addEventListener('click', () => { settingsModal.classList.add('hidden'); settingsModal.classList.remove('flex'); });

        saveSettings.addEventListener('click', () => {
            config.model = modelSelect.value;
            config.apiKey = apiKeyInput.value.trim();
            localStorage.setItem('ai_api_key', config.apiKey);
            settingsModal.classList.add('hidden'); settingsModal.classList.remove('flex');
            showToast('Saved successfully');
        });

        function showToast(msg) {
            toastMessage.textContent = msg;
            toast.classList.remove('translate-x-full');
            setTimeout(() => toast.classList.add('translate-x-full'), 3000);
        }

        loginBtn.addEventListener('click', () => {
            loginBtn.innerHTML = 'damo_ceo@gmail.com';
            creditBadge.classList.remove('hidden');
            creditBadge.classList.add('flex');
            loginBtn.classList.replace('bg-white', 'bg-slate-700');
            loginBtn.classList.replace('text-slate-900', 'text-white');
            showToast('Simulated Login Successful!');
        });

        buyBtn.addEventListener('click', () => {
            config.credits += 100;
            userCredits.innerText = config.credits;
            pricingModal.classList.add('hidden');
            pricingModal.classList.remove('flex');
            showToast('Payment Successful! +100 Credits');
        });

        closePricing.addEventListener('click', () => {
            pricingModal.classList.add('hidden');
            pricingModal.classList.remove('flex');
        });

        copyBtn.addEventListener('click', () => {
            if(!sourceEditor.value) return showToast('No content to copy!');
            navigator.clipboard.writeText(sourceEditor.value)
                .then(() => showToast('Markdown copied to clipboard!'))
                .catch(() => showToast('Failed to copy.'));
        });

        copyHtmlBtn.addEventListener('click', () => {
            if(!sourceEditor.value) return showToast('No content to copy!');
            const html = marked.parse(sourceEditor.value);
            navigator.clipboard.writeText(html)
                .then(() => showToast('HTML copied to clipboard!'))
                .catch(() => showToast('Failed to copy.'));
        });

        regenerateBtn.addEventListener('click', () => {
            generateBtn.click();
        });

        generateBtn.addEventListener('click', async () => {
            const keyword = keywordInput.value.trim();
            if (!keyword) return showToast('Enter keyword first!');

            if (config.credits <= 0) {
                pricingModal.classList.remove('hidden');
                pricingModal.classList.add('flex');
                return;
            }

            generateBtn.disabled = true;
            generateBtn.innerHTML = 'Generating...';
            outputSection.classList.remove('hidden');
            sourceEditor.value = '';
            previewPanel.innerHTML = '<div class="text-center py-20 text-slate-400">Crafting content...</div>';

            try {
                // Word count mapping
                const wordCountMap = {
                    'short': '300-500',
                    'standard': '800-1200',
                    'long': '1500-2000+'
                };
                const selectedLength = lengthSelect.value || 'standard';
                const wordCountRange = wordCountMap[selectedLength] || '800-1200';
                
                // Category tone mapping
                const categoryToneMap = {
                    'eco-home': 'Tone: Focus on energy efficiency, smart home integration, and modern clean tech terminology. Style: Technical yet accessible, emphasizing innovation and sustainability.',
                    'sustainable': 'Tone: Focus on zero waste, eco-friendly materials, and minimalism. Style: Natural, warm, and approachable with earth-conscious language.',
                    'camping-outdoor': 'Tone: Focus on durability, weatherproofing, and extreme performance. Style: Adventurous, energetic, and inspiring with outdoor enthusiast terminology.',
                    'solar': 'Tone: Focus on ROI, energy independence, and hard technical specifications. Style: Professional, authoritative, and engineer-focused with precise metrics.',
                    'automotive': 'Tone: Focus on extreme performance, horsepower, and reliability in harsh conditions. Style: Passionate, rugged, and enthusiast-driven with off-road culture references.'
                };
                const selectedCategory = categorySelect.value || '';
                const categoryTone = categoryToneMap[selectedCategory] || '';
                
                const systemPrompt = config.prompts.base + "\n" + (config.prompts[platformSelect.value] || '') + "\n" + categoryTone;
                const userPrompt = `Generate copy for: ${keyword}\nAudience: ${audienceInput.value}\nFeatures:\n${sellingPointsInput.value}\n\nCRITICAL REQUIREMENT: The output MUST strictly be between ${wordCountRange} words. Do not exceed or fall below this range.`;

                const response = await fetch('https://damp-breeze-e25elikecamping-api-proxy.kabin7691.workers.dev', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: config.model,
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: userPrompt }
                        ],
                        temperature: 0.7,
                        max_tokens: 4096,
                        stream: false
                    })
                });

                if (!response.ok) {
                    const err = await response.text();
                    throw new Error(`API Error: ${response.status} - ${err}`);
                }

                const data = await response.json();
                let content = '';
                if (data.choices && data.choices[0] && data.choices[0].message) {
                    content = data.choices[0].message.content;
                } else {
                    content = data.content || data.text || data.result || "【解析失败】\n" + JSON.stringify(data);
                }

                config.credits -= 1;
                userCredits.innerText = config.credits;

                sourceEditor.value = content;
                previewPanel.innerHTML = marked.parse(content);
                showToast('Success!');

            } catch (error) {
                console.error(error);
                sourceEditor.value = `【系统报错】\n\n${error.message}`;
                previewPanel.innerHTML = `<div class="text-red-500 py-10"><b>Failed:</b> ${error.message}</div>`;
                showToast('Generation failed');
            } finally {
                generateBtn.disabled = false;
                generateBtn.innerHTML = 'Generate Optimized Content';
            }
        });
        
        sourceEditor.addEventListener('input', () => { previewPanel.innerHTML = marked.parse(sourceEditor.value); });
    </script>
</body>
